<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小心地滑！救出寶可夢</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }
    canvas { display: block; }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 12px 16px; pointer-events: none; z-index: 10;
    }
    .hud-panel {
      background: rgba(0,0,0,0.55); color: #fff;
      border-radius: 10px; padding: 8px 14px;
      font-size: 14px; line-height: 1.7;
      pointer-events: auto;
    }
    #money-display { font-size: 20px; font-weight: bold; color: #FFD700; }
    /* Timer bar — slim strip at very top */
    #slip-timer-bar-wrap {
      position: fixed; top: 0; left: 0; right: 0;
      height: 6px; z-index: 12; pointer-events: none;
    }
    #slip-timer-bar {
      height: 100%; width: 100%;
      background: #2ecc71;
      transition: background 0.3s, width 0.25s linear;
    }
    /* Ground-status label just below HUD panels */
    #slip-label {
      position: fixed; top: 108px; left: 50%; transform: translateX(-50%);
      font-size: 13px; color: #fff; background: rgba(0,0,0,0.52);
      padding: 3px 12px; border-radius: 8px; z-index: 11; pointer-events: none;
      white-space: nowrap;
    }
    #slip-alert {
      position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
      font-size: 40px; font-weight: bold; color: #FF2222;
      text-shadow: 0 0 20px #ff0, 0 0 40px #f00;
      display: none; z-index: 20; pointer-events: none;
      white-space: nowrap;
      animation: pulse 0.3s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.08); } }

    #zone-display { font-size: 13px; color: #aef; }
    #holding-display { font-size: 13px; }

    /* Controls help */
    #controls-hint {
      position: fixed; bottom: 40px; right: 16px;
      background: rgba(0,0,0,0.5); color: #ccc;
      font-size: 12px; padding: 8px 12px; border-radius: 8px;
      line-height: 1.8; z-index: 10;
    }

    /* Warp flash */
    #warp-flash {
      position: fixed; inset: 0; background: white;
      opacity: 0; pointer-events: none; z-index: 30;
      transition: opacity 0.1s;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="hud">
    <div class="hud-panel">
      <div id="player-name-display" style="font-size:13px;color:#ffd;margin-bottom:2px;"></div>
      <div id="money-display">💰 $0</div>
      <div id="zone-display">區間：Zone 1</div>
      <div id="holding-display">手持：無</div>
    </div>
    <div class="hud-panel" id="stats-panel">
      速度 Lv.<span id="speed-lv">0</span> &nbsp;|&nbsp; 抓地 Lv.<span id="grip-lv">0</span>
    </div>
  </div>

  <div id="slip-label">地面狀態：安全 ✅</div>
  <div id="slip-timer-bar-wrap"><div id="slip-timer-bar"></div></div>
  <div id="slip-alert">🌊 海嘯來了！</div>
  <div id="controls-hint">
    WASD / 方向鍵 移動<br>
    E 鍵 抓取 / 放下寶可夢<br>
    B 鍵 前往基地<br>
    空白鍵 衝刺
  </div>
  <div id="warp-flash"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js?v=32"></script>
</body>
</html>
