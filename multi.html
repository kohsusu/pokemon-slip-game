<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小心地滑！救出寶可夢 — 四人連線</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }
    canvas { display: block; }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 12px 16px; pointer-events: none; z-index: 10;
    }
    .hud-panel {
      background: rgba(0,0,0,0.55); color: #fff;
      border-radius: 10px; padding: 8px 14px;
      font-size: 14px; line-height: 1.7;
      pointer-events: auto;
    }
    #money-display { font-size: 20px; font-weight: bold; color: #FFD700; }
    #zone-display  { font-size: 13px; color: #aef; }
    #holding-display { font-size: 13px; }

    /* Players panel — centre HUD (max-height prevents it growing over HUD) */
    #players-panel {
      font-size: 12px; line-height: 1.6;
      text-align: center; min-width: 110px;
      max-height: 130px; overflow-y: auto;
    }

    /* Timer bar at very top */
    #slip-timer-bar-wrap {
      position: fixed; top: 0; left: 0; right: 0;
      height: 6px; z-index: 12; pointer-events: none;
    }
    #slip-timer-bar {
      height: 100%; width: 100%;
      background: #2ecc71;
      transition: background 0.3s, width 0.25s linear;
    }

    /* Ground-status label — sits below the players panel */
    #slip-label {
      position: fixed; top: 155px; left: 50%; transform: translateX(-50%);
      font-size: 13px; color: #fff; background: rgba(0,0,0,0.52);
      padding: 3px 12px; border-radius: 8px; z-index: 11; pointer-events: none;
      white-space: nowrap;
    }

    /* Big tsunami alert — centred vertically so it never clashes with HUD */
    #slip-alert {
      position: fixed;
      top: 50%; left: 50%;
      transform: translateX(-50%) translateY(-50%);
      font-size: 44px; font-weight: bold; color: #FF2222;
      text-shadow: 0 0 20px #ff0, 0 0 40px #f00;
      display: none; z-index: 20; pointer-events: none;
      white-space: nowrap;
      animation: pulse 0.3s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { transform: translateX(-50%) translateY(-50%) scale(1); }
      to   { transform: translateX(-50%) translateY(-50%) scale(1.08); }
    }

    /* Controls hint */
    #controls-hint {
      position: fixed; bottom: 170px; right: 16px;
      background: rgba(0,0,0,0.5); color: #ccc;
      font-size: 11px; padding: 8px 12px; border-radius: 8px;
      line-height: 1.9; z-index: 10;
    }

    /* Warp flash */
    #warp-flash {
      position: fixed; inset: 0; background: white;
      opacity: 0; pointer-events: none; z-index: 30;
      transition: opacity 0.1s;
    }

    /* ── Chat log (bottom-left, above save/music buttons) ────────────────── */
    #chat-log {
      position: fixed; bottom: 115px; left: 10px;
      width: 230px; max-height: 130px; overflow: hidden;
      z-index: 10; pointer-events: none;
      display: flex; flex-direction: column; justify-content: flex-end; gap: 3px;
    }
    .chat-entry {
      font-size: 12px; color: #fff;
      background: rgba(0,0,0,0.62);
      padding: 3px 9px; border-radius: 7px;
      line-height: 1.5; word-break: break-word;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    /* ── Emoji bar (bottom-centre) ────────────────────────────────────────── */
    #emoji-bar {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 30;
    }
    .emoji-btn {
      background: rgba(0,0,0,0.65);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 9px;
      padding: 5px 7px;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 1px;
      transition: transform 0.1s, border-color 0.15s;
      pointer-events: auto;
    }
    .emoji-btn span {
      font-size: 9px; color: #aaa; line-height: 1;
    }
    .emoji-btn:hover {
      transform: scale(1.18);
      border-color: rgba(255,255,255,0.65);
    }
    .emoji-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <!-- ── HUD ───────────────────────────────────────────────────────────────── -->
  <div id="hud">
    <!-- Left: economy info -->
    <div class="hud-panel">
      <div id="player-name-display" style="font-size:13px;color:#ffd;margin-bottom:2px;"></div>
      <div id="money-display">💰 $0</div>
      <div id="zone-display">區間：Zone 1</div>
      <div id="holding-display">手持：無</div>
    </div>

    <!-- Centre: connected players list -->
    <div class="hud-panel" id="players-panel">
      <span style="color:#888;font-size:12px;">連線中…</span>
    </div>

    <!-- Right: upgrades -->
    <div class="hud-panel" id="stats-panel">
      速度 Lv.<span id="speed-lv">0</span> &nbsp;|&nbsp; 抓地 Lv.<span id="grip-lv">0</span>
    </div>
  </div>

  <!-- Ground status & alerts -->
  <div id="slip-label">地面狀態：安全 ✅</div>
  <div id="slip-timer-bar-wrap"><div id="slip-timer-bar"></div></div>
  <div id="slip-alert">🌊 海嘯來了！</div>

  <!-- Controls hint -->
  <div id="controls-hint">
    WASD / 方向鍵 移動<br>
    空白鍵 切換衝刺<br>
    <b>E</b> 抓取 / 存入基地<br>
    <b>F</b> 賣出一隻（基地旁）<br>
    <b>B</b> 商店（商店旁）<br>
    <b>1–8</b> 發送表情符號
  </div>

  <!-- Warp flash overlay -->
  <div id="warp-flash"></div>

  <!-- Chat log -->
  <div id="chat-log"></div>

  <!-- Emoji bar -->
  <div id="emoji-bar">
    <button class="emoji-btn" data-idx="0">👍<span>1</span></button>
    <button class="emoji-btn" data-idx="1">😱<span>2</span></button>
    <button class="emoji-btn" data-idx="2">🎉<span>3</span></button>
    <button class="emoji-btn" data-idx="3">😂<span>4</span></button>
    <button class="emoji-btn" data-idx="4">🔥<span>5</span></button>
    <button class="emoji-btn" data-idx="5">💀<span>6</span></button>
    <button class="emoji-btn" data-idx="6">❤️<span>7</span></button>
    <button class="emoji-btn" data-idx="7">🌊<span>8</span></button>
  </div>

  <script type="module" src="./src/main_multi.js?v=29"></script>
</body>
</html>
