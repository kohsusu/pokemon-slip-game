<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小心地滑！救出寶可夢 — 四人連線</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }
    canvas { display: block; }

    /* ── HUD ──────────────────────────────────────────────────────────────── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 10px 14px; pointer-events: none; z-index: 10; gap: 10px;
    }
    .hud-panel {
      background: rgba(0,0,0,0.60); color: #fff;
      border-radius: 10px; padding: 9px 15px;
      font-size: 14px; line-height: 1.75;
      pointer-events: auto;
      backdrop-filter: blur(2px);
    }

    /* Left panel */
    #money-display  { font-size: 22px; font-weight: bold; color: #FFD700; line-height: 1.3; }
    #zone-display   { font-size: 14px; color: #aef; display: inline; }
    #holding-display{ font-size: 14px; display: inline; }
    #prize-pool-display { font-size: 13px; color: #FFD700; margin-top: 2px; }
    #player-name-display { font-size: 13px; color: #ffd; margin-bottom: 1px; }
    #zone-hold-row  { font-size: 14px; }

    /* Centre: player list */
    #players-panel {
      font-size: 13px; line-height: 1.65;
      text-align: center; min-width: 130px; max-width: 200px;
      max-height: 160px; overflow-y: auto; flex-shrink: 0;
    }

    /* Right: stats — vertical stack */
    #stats-panel {
      font-size: 15px; line-height: 1.8;
      white-space: nowrap;
    }

    /* ── Timer bar (top edge) ─────────────────────────────────────────────── */
    #slip-timer-bar-wrap {
      position: fixed; top: 0; left: 0; right: 0;
      height: 5px; z-index: 12; pointer-events: none;
    }
    #slip-timer-bar {
      height: 100%; width: 100%;
      background: #2ecc71;
      transition: background 0.3s, width 0.25s linear;
    }

    /* ── Ground-status label ─────────────────────────────────────────────── */
    /* top is set dynamically by JS after HUD height is known */
    #slip-label {
      position: fixed; top: 130px; left: 10px;
      font-size: 14px; color: #fff; background: rgba(0,0,0,0.58);
      padding: 4px 14px; border-radius: 9px; z-index: 11; pointer-events: none;
      white-space: nowrap; letter-spacing: 0.3px;
    }

    /* ── Tsunami banner ──────────────────────────────────────────────────── */
    #slip-alert {
      position: fixed;
      top: 50%; left: 50%;
      transform: translateX(-50%) translateY(-50%);
      font-size: 48px; font-weight: bold; color: #FF2222;
      text-shadow: 0 0 20px #ff0, 0 0 40px #f00;
      display: none; z-index: 20; pointer-events: none;
      white-space: nowrap;
      animation: pulse 0.3s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { transform: translateX(-50%) translateY(-50%) scale(1); }
      to   { transform: translateX(-50%) translateY(-50%) scale(1.08); }
    }

    /* ── Controls hint — collapsible ─────────────────────────────────────── */
    #controls-wrap {
      position: fixed; bottom: 72px; right: 14px;
      z-index: 15;
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    }
    #controls-btn {
      background: rgba(0,0,0,0.65); color: #ccc;
      border: 1px solid rgba(255,255,255,0.22); border-radius: 8px;
      padding: 5px 11px; font-size: 14px; cursor: pointer;
      pointer-events: auto; user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #controls-btn:hover { background: rgba(0,0,0,0.82); border-color: rgba(255,255,255,0.5); }
    #controls-hint {
      display: none;                     /* hidden by default — toggle with button */
      background: rgba(8,8,24,0.90); color: #ddd;
      font-size: 13px; padding: 11px 16px; border-radius: 10px;
      line-height: 2.1; text-align: right;
      border: 1px solid rgba(255,255,255,0.13);
      pointer-events: auto;
      max-width: 230px;
    }
    #controls-hint.open { display: block; }

    /* ── Warp flash ───────────────────────────────────────────────────────── */
    #warp-flash {
      position: fixed; inset: 0; background: white;
      opacity: 0; pointer-events: none; z-index: 30;
      transition: opacity 0.1s;
    }

    /* ── Chat log ─────────────────────────────────────────────────────────── */
    #chat-log {
      position: fixed; bottom: 88px; left: 10px;
      width: 260px; max-height: 120px; overflow: hidden;
      z-index: 10; pointer-events: none;
      display: flex; flex-direction: column; justify-content: flex-end; gap: 3px;
    }
    .chat-entry {
      font-size: 13px; color: #fff;
      background: rgba(0,0,0,0.65);
      padding: 4px 10px; border-radius: 7px;
      line-height: 1.55; word-break: break-word;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    /* ── Emoji bar (bottom-centre) ────────────────────────────────────────── */
    #emoji-bar {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; z-index: 30;
    }
    .emoji-btn {
      background: rgba(0,0,0,0.68);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 9px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 1px;
      transition: transform 0.1s, border-color 0.15s;
      pointer-events: auto;
    }
    .emoji-btn span { font-size: 9px; color: #aaa; line-height: 1; }
    .emoji-btn:hover { transform: scale(1.18); border-color: rgba(255,255,255,0.65); }
    .emoji-btn:active { transform: scale(0.95); }

    /* ── Rare-event banner animations ─────────────────────────────────────── */
    @keyframes _bannerIn {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    @keyframes _rarePulse {
      from { transform: scale(1);    }
      to   { transform: scale(1.14); }
    }

    /* ── Team victory progress bar (bottom) ───────────────────────────────── */
    #victory-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 28px; z-index: 20; pointer-events: none;
      display: flex; align-items: center; overflow: hidden;
      background: rgba(0,0,0,0.68);
    }
    #victory-bar-fill {
      position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
      background: linear-gradient(90deg, #1B5E20 0%, #43A047 55%, #FFD700 90%, #FF8F00 100%);
      transition: width 1.5s ease;
    }
    #victory-bar-label {
      position: relative; width: 100%; text-align: center;
      font-size: 13px; font-weight: bold; color: #fff;
      text-shadow: 0 0 6px #000; white-space: nowrap; z-index: 1;
    }

    /* ── Golden hour frame + badge ────────────────────────────────────────── */
    #golden-hour-wrap {
      position: fixed; inset: 0; pointer-events: none; z-index: 18;
      border: 0px solid #FFD700;
      box-shadow: inset 0 0 0px rgba(255,215,0,0);
      transition: border-width 0.3s, box-shadow 0.3s;
    }
    #golden-hour-wrap.active {
      border: 5px solid #FFD700;
      box-shadow: inset 0 0 70px rgba(255,200,0,0.18);
    }
    #golden-hour-badge {
      position: fixed; top: 130px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #E65100, #FFD700 55%, #E65100);
      color: #111; font-weight: bold; font-size: 15px;
      padding: 5px 20px; border-radius: 22px; z-index: 19;
      pointer-events: none; display: none; white-space: nowrap;
      box-shadow: 0 2px 14px rgba(255,200,0,0.7);
      animation: ghPulse 0.85s ease-in-out infinite alternate;
    }
    @keyframes ghPulse {
      from { transform: translateX(-50%) scale(1);    }
      to   { transform: translateX(-50%) scale(1.06); }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <!-- ── HUD ───────────────────────────────────────────────────────────────── -->
  <div id="hud">

    <!-- Left: economy -->
    <div class="hud-panel">
      <div id="player-name-display"></div>
      <div id="money-display">💰 $0</div>
      <div id="zone-hold-row">
        <span id="zone-display">區間：基地</span>
        &nbsp;｜&nbsp;
        <span id="holding-display">手持：無</span>
      </div>
      <div id="prize-pool-display">🏆 $0</div>
    </div>

    <!-- Centre: players list -->
    <div class="hud-panel" id="players-panel">
      <span style="color:#888;font-size:13px;">連線中…</span>
    </div>

    <!-- Right: upgrades + gift -->
    <div class="hud-panel" id="stats-panel">
      🏃 Lv.<span id="speed-lv">0</span><br>
      🧲 Lv.<span id="magnet-lv">0</span><br>
      🎁 <span id="gift-indicator" style="color:#aaa;">無</span>
    </div>

  </div>

  <!-- Ground status & tsunami alert -->
  <div id="slip-timer-bar-wrap"><div id="slip-timer-bar"></div></div>
  <div id="slip-label">地面狀態：安全 ✅</div>
  <div id="slip-alert">🌊 海嘯來了！</div>

  <!-- Controls hint — collapsible -->
  <div id="controls-wrap">
    <div id="controls-hint">
      WASD / 方向鍵 移動<br>
      空白鍵 切換衝刺<br>
      <b>E</b> 抓取 / 存入基地<br>
      <b>F</b> 賣出一隻（商店旁）<br>
      <b>B</b> 商店 / 彩票（商店旁）<br>
      <b>G</b> 打開禮包（商店旁）<br>
      <b>1–8</b> 發送表情符號<br>
      <b>V</b> 快捷語面板
    </div>
    <button id="controls-btn">❓ 操控</button>
  </div>

  <!-- Team victory bar -->
  <div id="victory-wrap">
    <div id="victory-bar-fill"></div>
    <div id="victory-bar-label">🎯 全隊目標：讀取中…</div>
  </div>

  <!-- Golden hour frame + badge -->
  <div id="golden-hour-wrap"></div>
  <div id="golden-hour-badge">⭐ 黃金時刻！×2.5 &nbsp; <span id="gh-countdown">45</span>s</div>

  <!-- Warp flash overlay -->
  <div id="warp-flash"></div>

  <!-- Chat log -->
  <div id="chat-log"></div>

  <!-- Emoji bar -->
  <div id="emoji-bar">
    <button class="emoji-btn" data-idx="0">👍<span>1</span></button>
    <button class="emoji-btn" data-idx="1">😱<span>2</span></button>
    <button class="emoji-btn" data-idx="2">🎉<span>3</span></button>
    <button class="emoji-btn" data-idx="3">😂<span>4</span></button>
    <button class="emoji-btn" data-idx="4">🔥<span>5</span></button>
    <button class="emoji-btn" data-idx="5">💀<span>6</span></button>
    <button class="emoji-btn" data-idx="6">❤️<span>7</span></button>
    <button class="emoji-btn" data-idx="7">🌊<span>8</span></button>
  </div>

  <!-- Error display + watchdog -->
  <script>
    // Controls toggle
    document.getElementById('controls-btn').addEventListener('click', function() {
      document.getElementById('controls-hint').classList.toggle('open');
    });

    // JS error overlay (deduplication)
    function _showErr(title, detail) {
      if (document.getElementById('_err-overlay')) return;
      var d = document.createElement('div');
      d.id = '_err-overlay';
      d.style.cssText =
        'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);' +
        'background:rgba(120,0,0,0.97);color:#fff;padding:22px 30px;border-radius:14px;' +
        'z-index:9999;font-size:13px;font-family:monospace;max-width:90vw;max-height:80vh;' +
        'overflow:auto;text-align:left;line-height:1.8;white-space:pre-wrap;';
      d.innerHTML = '<b style="font-size:15px;">⛔ ' + title + '</b>\n\n' + detail;
      document.body.appendChild(d);
    }
    window.onerror = function(msg, src, line, col, err) {
      _showErr('JS 錯誤', (src || '') + ':' + line + '\n' + msg + '\n' + (err && err.stack || ''));
    };
    window.addEventListener('unhandledrejection', function(ev) {
      _showErr('Promise 錯誤', String(ev.reason && ev.reason.stack || ev.reason || ev));
    });
    setTimeout(function() {
      if (!document.querySelector('canvas')) {
        _showErr('遊戲載入失敗',
          '可能原因：\n' +
          '• JS 模組載入出錯（請看上方錯誤訊息）\n' +
          '• WebGL 不可用\n' +
          '• vendor/ 檔案缺失\n\n' +
          '請開啟 http://localhost:7778/test_vendor.html 診斷\n' +
          '然後按 Ctrl+Shift+R 強制重新整理');
      }
    }, 12000);

    // Adjust slip-label top after HUD renders (one-shot)
    requestAnimationFrame(function() {
      var hud = document.getElementById('hud');
      if (hud) {
        var h = hud.getBoundingClientRect().bottom;
        var label = document.getElementById('slip-label');
        if (label) label.style.top = (Math.round(h) + 8) + 'px';
        var badge = document.getElementById('golden-hour-badge');
        if (badge) badge.style.top = (Math.round(h) + 8) + 'px';
      }
    });
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.js",
      "three/addons/": "./vendor/addons/"
    }
  }
  </script>
  <script type="module" src="./src/main_multi.js?v=64"></script>
</body>
</html>
